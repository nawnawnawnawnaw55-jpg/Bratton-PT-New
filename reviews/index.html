<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Patient Reviews - Bratton Physical Therapy Slidell LA</title>
<meta name="description" content="Read what our patients say about Bratton Physical Therapy in Slidell, LA.">
<meta property="og:title" content="Patient Reviews - Bratton Physical Therapy">
<meta property="og:description" content="Read what our patients say about Bratton Physical Therapy in Slidell, LA.">
<meta property="og:url" content="/reviews/">
<meta property="og:site_name" content="Bratton Physical Therapy">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css"><link rel="stylesheet" href="/css/header.css"><link rel="stylesheet" href="/css/home.css">
<link rel="shortcut icon" type="image/x-icon" href="/favicon.ico" />
<style>
  .reviews-page-grid{display:grid;gap:20px;grid-template-columns:1fr}
  @media(min-width:768px){.reviews-page-grid{grid-template-columns:repeat(2,1fr)}}
  .reviews-page-grid .review-card{display:block;animation:none}
  .reviews-page-grid .review-card{overflow:visible}
  .reviews-page-grid .review-card__text{max-height:4.4em;overflow:hidden;position:relative;transition:max-height .4s ease}
  .reviews-page-grid .review-card__text.expanded{max-height:3000px;overflow:visible}
  .reviews-page .review-subtitle{text-align:center;font-size:.85rem;color:var(--gray);margin-top:-8px;margin-bottom:20px}
  .reviews-page-grid .review-card__readmore{cursor:pointer;color:var(--primary);font-size:.82rem;font-weight:600;margin-top:6px;display:block}
  .reviews-page-grid .review-card__readmore:hover{color:var(--accent)}
  .reviews-page .overall-stats{text-align:center;margin-bottom:24px}
  .reviews-page .overall-rating{font-size:3rem;font-family:var(--font-heading);font-weight:800;color:var(--accent);line-height:1}
  .reviews-page .overall-stars{font-size:1.4rem;color:var(--accent);margin:4px 0}
  .reviews-page .overall-count{font-size:.9rem;color:var(--gray)}
</style>
</head>
<body>
<div id="site-header"></div>
<script>
  fetch('/templates/header.html')
    .then(function(r){return r.text()})
    .then(function(h){document.getElementById('site-header').innerHTML=h})
    .then(function(){
      var toggle=document.getElementById('menu-toggle');
      var nav=document.getElementById('main-nav');
      if(toggle&&nav){toggle.addEventListener('click',function(){nav.classList.toggle('nav--open')})}
      var path=window.location.pathname;
      document.querySelectorAll('.nav__link').forEach(function(link){
        link.classList.toggle('nav__link--active',link.getAttribute('href')===path);
      });
    });
</script>

<main id="main-content">
  <section class="section reviews-page">
    <div class="container">
      <div class="section-title">
        <h1>Patient Reviews</h1>
        <p>Hear from real patients about their experience at Bratton Physical Therapy</p>
      </div>
      <div class="overall-stats" id="overall-stats">Loading...</div>
      <div class="reviews-page-grid" id="reviews-page-grid">Loading reviews...</div>
    </div>
  </section>

  <section class="section section--accent" style="text-align:center"><div class="container"><h2>Ready to Feel Better?</h2><p style="font-size:1.1rem;margin-bottom:20px">Schedule your initial evaluation and let's make things happen!</p><a href="tel:9856415825" class="btn btn--accent btn--lg">&#x260E; Call Today (985) 641-5825</a></div></section>

<div id="site-footer"></div>
<script>
  fetch('/templates/footer.html')
    .then(function(r){return r.text()})
    .then(function(f){document.getElementById('site-footer').innerHTML=f});
</script>
</main>

<script src="/js/main.js"></script>

<script>
(function(){
  var grid = document.getElementById('reviews-page-grid');
  var statsEl = document.getElementById('overall-stats');
  var avatarColors = ['var(--success)','var(--primary)','var(--accent)','var(--primary-dark)','var(--secondary)','#e74c3c','#8e44ad','#16a085'];

  function getInitials(name){
    return (name||'?').split(' ').map(function(w){return w.charAt(0).toUpperCase()}).join('').substring(0,2);
  }

  function starStr(r){return '★'.repeat(Math.round(r)) + '☆'.repeat(5 - Math.round(r));}

  function escapeHTML(str){
    var d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  window._pageReviews = [];
  window._pageToggleReview = function(event, idx){
    if (event) { event.stopPropagation(); event.preventDefault(); }
    var review = window._pageReviews[idx];
    if (!review) return;
    var textEl = grid.querySelector('.review-card__text[data-idx="' + idx + '"]');
    if (!textEl) return;
    var readmoreEl = grid.querySelector('.review-card__readmore[data-idx="' + idx + '"]');
    var isExpanded = textEl.classList.contains('expanded');
    if (isExpanded){
      textEl.classList.remove('expanded');
      textEl.style.maxHeight = '';
      textEl.style.overflow = '';
      textEl.textContent = review.text.length > 150 ? review.text.substring(0, 150) + '...' : review.text;
      if (readmoreEl) readmoreEl.innerHTML = 'Read more ▼';
    } else {
      textEl.classList.add('expanded');
      textEl.style.maxHeight = 'none';
      textEl.style.overflow = 'visible';
      textEl.textContent = review.text;
      if (readmoreEl) readmoreEl.innerHTML = 'Show less ▲';
    }
  };

  function renderReviews(reviews, overallRating, totalReviews){
    window._pageReviews = reviews;

    // Overall stats — show global Google rating & total count
    statsEl.innerHTML = '<div class="overall-rating">' + overallRating.toFixed(1) + '</div>' +
      '<div class="overall-stars">' + starStr(overallRating) + '</div>' +
      '<div class="overall-count">Based on ' + totalReviews + ' Google reviews</div>' +
      '<p class="review-subtitle">Showing ' + reviews.length + ' most recent reviews</p>';

    // Review cards
    grid.innerHTML = reviews.map(function(r, i){
      var isLong = r.text.length > 150;
      var displayText = isLong ? escapeHTML(r.text.substring(0, 150)) + '...' : escapeHTML(r.text);
      var readMoreHTML = isLong
        ? '<span class="review-card__readmore" data-idx="' + i + '" onclick="event.stopPropagation();window._pageToggleReview(event,' + i + ')">Read more ▼</span>'
        : '';
      var photoHTML = r.photo
        ? '<div class="review-card__avatar" style="background:' + avatarColors[i % avatarColors.length] + ';background-image:url(' + escapeHTML(r.photo) + ');background-size:cover;background-position:center"></div>'
        : '<div class="review-card__avatar" style="background:' + avatarColors[i % avatarColors.length] + '">' + getInitials(r.name) + '</div>';
      return '<div class="review-card">' +
        '<div class="review-card__header">' +
        photoHTML +
        '<div><div class="review-card__stars">' + starStr(r.rating) + '</div><strong>' + escapeHTML(r.name) + '</strong></div>' +
        '</div>' +
        '<p class="review-card__text" data-idx="' + i + '" onclick="window._pageToggleReview(event,' + i + ')">' + displayText + '</p>' +
        readMoreHTML +
        '</div>';
    }).join('');
  }

  // Hardcoded fallback reviews (used when API is unreachable)
  var fallbackReviewsPage = [
    {name:'Gary L.',time:'8 months ago',rating:5,text:'Just want to thank Jena and staff for a great job in rehabbing my right rotator cuff. I had two complete tears out of the four muscles of the cuff. Jena and staff rehabbed my shoulder without a need for surgery.'},
    {name:'John C.',time:'1 year ago',rating:5,text:'The experience has been outstanding! When I first came to Bratton Physical Therapy I had sore ankles, couldn\'t walk more than 50 feet, getting up from sitting was painful. Now I can easily walk hundreds of yards, I have no pain.'},
    {name:'Barbara K.',time:'1 year ago',rating:5,text:'My journey at Bratton PT began after I spent 3 days, about 6 hours a day working on a ladder moving shelving over my head remodeling my master closet. I developed pain in my neck and upper back. I chose Bratton PT because I used them in the past.'},
    {name:'Nina S.',time:'2 years ago',rating:5,text:'Before coming I struggled picking up my son, sitting comfortably, and sleeping due to severe shoulder pain and limited neck mobility. Jena knew what the issue was immediately. She created a plan that quickly diminished my pain.'},
    {name:'Stephen D.',time:'3 years ago',rating:5,text:'After major rotator cuff surgery, I was unable to move my arm away from my side. I was also experiencing considerable pain related to the surgery. For my physical therapy treatment, my Surgeon recommended Jena Bratton, PT.'},
    {name:'James S.',time:'3 years ago',rating:5,text:'My journey has been one of great pain and great rewards. Many years ago my knees began failing and I was not successful with gym workouts helping the problem. It took quite a while in obtaining surgical approval to have my knees replaced.'},
    {name:'Paul R.',time:'9 months ago',rating:5,text:'Undergoing PT for total hip replacement. The treatment is awesome. I get a custom PT plan focused on my needs and progress. I am so happy I came to Bratton.'},
    {name:'Jeannie R.',time:'10 months ago',rating:5,text:'You cannot go wrong having your pains disappear at Bratton PT! Individual attention, explanation of each procedure before it is executed! They make it fun!'},
    {name:'Nathan W.',time:'7 months ago',rating:5,text:'I came to seek relief from my Achilles tendon pain and very quickly they worked with me to make a targeted plan to reduce pain long term. Excellent experience.'},
    {name:'Susan B.',time:'6 months ago',rating:5,text:'I had trouble with my right knee. It felt stiff, sore and achy. I tried Bratton Therapy Centre and it was the best decision ever. They came up with a special exercise program just for me.'},
    {name:'Don N.',time:'6 months ago',rating:5,text:'When I came to Bratton for a very weak right shoulder, I was becoming one arm person. After 6 weeks of physical therapy I now have full extension and much less pain. My sleep at night has improved as well.'},
    {name:'Alfred J.',time:'5 months ago',rating:5,text:'The staff is very professional. All guide your routine with caution and care. I began recovery after my first visit. I know my recovery is in good hands. Give them a call!'},
    {name:'Duran H.',time:'4 months ago',rating:5,text:'Extremely friendly staff. They know what they are doing here. I would recommend this place to anyone. Already feeling results after a couple of weeks.'},
    {name:'Nicholas B.',time:'3 months ago',rating:5,text:'My back pain was making day-to-day life absolutely miserable, but coming to see Ms. Jena and her amazing staff has been a total game-changer. I have significantly less pain and more flexibility.'},
    {name:'Paul Rieder',time:'2 months ago',rating:5,text:'Undergoing PT for total hip replacement. The treatment is awesome. I get a custom PT plan focused on my needs and progress. I am so happy that I came to Bratton.'},
    {name:'Jeannie Rivers',time:'1 month ago',rating:5,text:'You cannot go wrong by having your pains disappear when going to Bratton Physical Therapy! Individual attention, explanation of each procedure before it is executed! They make it fun!'}
  ];

  fetch('/api/reviews?newest=20')
    .then(function(r){ return r.json(); })
    .then(function(data){
      var allReviews = (data.reviews && data.reviews.length) ? data.reviews : [];
      var reviews = allReviews;
      if (reviews.length) {
        renderReviews(reviews, data.overall_rating || 5.0, data.total_reviews || reviews.length);
      } else {
        renderReviews(fallbackReviewsPage, 5.0, fallbackReviewsPage.length);
      }
    })
    .catch(function(){
      renderReviews(fallbackReviewsPage, 5.0, fallbackReviewsPage.length);
    });
})();
</script>
</body>
</html>
