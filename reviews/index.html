<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reviews — Bratton Physical Therapy | Slidell, LA</title>
<meta name="description" content="See what patients say about Bratton Physical Therapy in Slidell, LA. Real reviews from real patients.">
<meta property="og:title" content="Reviews — Bratton Physical Therapy">
<meta property="og:description" content="Real patient reviews for Bratton Physical Therapy in Slidell, LA.">
<meta property="og:url" content="/reviews/">
<meta property="og:site_name" content="Bratton Physical Therapy">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css"><link rel="stylesheet" href="/css/header.css"><link rel="stylesheet" href="/css/home.css">
<link rel="shortcut icon" type="image/x-icon" href="/favicon.ico" />
<style>
  .review-card { background: var(--light-gray); padding: 24px; border-radius: 8px; margin-bottom: 16px; }
  .review-stars { color: #f5a623; font-size: 1.1rem; letter-spacing: 2px; margin-bottom: 10px; }
  .review-body { font-style: italic; line-height: 1.7; margin-bottom: 10px; font-size: 1.05rem; }
  .review-author { font-weight: 700; color: var(--primary); }
  .review-date { font-size: 0.85rem; color: #888; margin-top: 4px; }
  .aggregate-badge { display: flex; align-items: center; gap: 12px; background: var(--primary); color: #fff; padding: 16px 24px; border-radius: 8px; margin-bottom: 32px; }
  .aggregate-badge .rating { font-size: 2rem; font-weight: 800; }
  .aggregate-badge .stars { color: #f5a623; font-size: 1.4rem; letter-spacing: 2px; }
  @media (max-width: 480px) {
    .aggregate-badge { flex-direction: column; text-align: center; gap: 6px; padding: 14px 16px; }
    .aggregate-badge .rating { font-size: 1.6rem; }
    .aggregate-badge .stars { font-size: 1.1rem; }
  }
</style>
</head>
<body>
<div id="site-header"></div>
<script>
  fetch('/templates/header.html')
    .then(function(r){return r.text()})
    .then(function(h){document.getElementById('site-header').innerHTML=h})
    .then(function(){
      var toggle=document.getElementById('menu-toggle');
      var nav=document.getElementById('main-nav');
      if(toggle&&nav){toggle.addEventListener('click',function(){nav.classList.toggle('nav--open')})}
      var path=window.location.pathname;
      document.querySelectorAll('.nav__link').forEach(function(link){
        link.classList.toggle('nav__link--active',link.getAttribute('href')===path);
      });
      window.initStickyNav&&window.initStickyNav();
    });
</script>

<main id="main-content">
  <section class="section">
    <div class="container" style="max-width:800px">
      <h1>Patient Reviews</h1>
      <p style="font-size:1.15rem;line-height:1.7">Our patients' success stories say it best. Here's what the community has to say about their experience at Bratton Physical Therapy.</p>

      <div class="aggregate-badge" id="aggregate-badge">
        <div class="rating" id="overall-rating">⋯</div>
        <div>
          <div class="stars" id="overall-stars">★★★★★</div>
          <div style="font-size:0.95rem" id="total-reviews-text">Loading reviews...</div>
        </div>
      </div>

      <div class="reviews-grid" id="reviews-grid">
        <div class="review-card"><p class="review-body" style="text-align:center;color:#999;padding:40px">Loading reviews from Google...</p></div>
      </div>

      <div style="display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin-top:32px">
        <a href="https://search.google.com/local/reviews?placeid=ChIJicdBse3mnYgRyU49RjVmRs0" target="_blank" rel="noopener" class="btn btn--accent btn--lg">Read More Reviews on Google</a>
      </div>
    </div>
  </section>
</main>

<div id="site-footer"></div>
<script>
  fetch('/templates/footer.html')
    .then(function(r){return r.text()})
    .then(function(f){document.getElementById('site-footer').innerHTML=f});
</script>
<script>
(function(){
  var grid = document.getElementById('reviews-grid');
  var ratingEl = document.getElementById('overall-rating');
  var starsEl = document.getElementById('overall-stars');
  var totalText = document.getElementById('total-reviews-text');

  function starStr(rating){
    var full = Math.round(rating);
    return '★'.repeat(full) + '☆'.repeat(5 - full);
  }

  fetch('/api/reviews?all=1')
    .then(function(r){return r.json()})
    .then(function(data){
      var rating = data.overall_rating || 5.0;
      var total = data.total_reviews || 0;
      var reviews = data.reviews || [];

      ratingEl.textContent = rating.toFixed(1);
      starsEl.textContent = starStr(rating);
      totalText.textContent = 'Based on ' + total + ' patient reviews';

      if (!reviews.length){
        grid.innerHTML = '<div class="review-card"><p class="review-body" style="text-align:center;color:#999;padding:40px">No reviews found. Check back soon!</p></div>';
        return;
      }

      grid.innerHTML = reviews.map(function(r){
        return '<div class="review-card">' +
          '<div class="review-stars">' + starStr(r.rating) + '</div>' +
          '<p class="review-body">"' + escapeHTML(r.text) + '"</p>' +
          '<p class="review-author">' + escapeHTML(r.name) + '</p>' +
          '<p class="review-date">' + escapeHTML(r.time) + '</p>' +
          '</div>';
      }).join('');
    })
    .catch(function(){
      ratingEl.textContent = '5.0';
      starsEl.textContent = '★★★★★';
      totalText.textContent = 'Based on patient reviews';
      grid.innerHTML = '<div class="review-card"><p class="review-body" style="text-align:center;color:#999;padding:40px">Unable to load reviews. Please check back later or visit us on Google.</p></div>';
    });

  function escapeHTML(str){
    var d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }
})();
</script>
<script src="/js/main.js"></script>
</body>
</html>
