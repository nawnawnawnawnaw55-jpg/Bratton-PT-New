<style>
  .reviews-page-grid{display:grid;gap:20px;grid-template-columns:1fr}
  @media(min-width:768px){.reviews-page-grid{grid-template-columns:repeat(2,1fr)}}
  .reviews-page-grid .review-card{display:block;animation:none}
  .reviews-page-grid .review-card{overflow:visible}
  .reviews-page-grid .review-card__text{max-height:4.4em;overflow:hidden;position:relative;transition:max-height .4s ease}
  .reviews-page-grid .review-card__text.expanded{max-height:3000px;overflow:visible}
  .reviews-page-grid .review-card__readmore{cursor:pointer;color:var(--primary);font-size:.82rem;font-weight:600;margin-top:6px;display:block}
  .reviews-page-grid .review-card__readmore:hover{color:var(--accent)}
   /* === Glass + Google stats card === */
   .reviews-page .overall-stats{display:flex;align-items:center;gap:20px;background:linear-gradient(135deg, #2257A6 0%, #1B3B6F 60%, #142c54 100%);padding:28px 40px;border-radius:16px;box-shadow:0 12px 40px rgba(34,87,166,0.35), inset 0 1px 0 rgba(255,255,255,0.15);margin:24px auto 32px;width:fit-content;min-width:300px;position:relative;overflow:hidden}
   .reviews-page .overall-stats::before{content:"";position:absolute;top:-50%;right:-20%;width:200px;height:200px;border-radius:50%;background:rgba(248,111,38,0.12);pointer-events:none}
   .reviews-page .overall-stats::after{content:"";position:absolute;bottom:-30%;left:-10%;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.04);pointer-events:none}
   .reviews-page .stats-google-badge{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:6px}
   .reviews-page .stats-google-g{width:52px;height:52px;background:var(--white);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-heading);font-weight:800;font-size:1.6rem;color:var(--primary);box-shadow:0 6px 20px rgba(0,0,0,0.25)}
   .reviews-page .stats-google-label{font-size:.65rem;font-family:var(--font-heading);font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.65)}
   .reviews-page .stats-rating-block{text-align:center;position:relative;z-index:1;margin-left:-2px}
   .reviews-page .overall-rating{font-size:3.5rem;font-family:var(--font-heading);font-weight:800;color:var(--white);line-height:1;letter-spacing:-1px}
   .reviews-page .overall-stars{font-size:1.3rem;color:var(--accent);margin:2px 0 6px;letter-spacing:2px;text-shadow:0 0 12px rgba(248,111,38,0.5)}
   .reviews-page .overall-count{font-size:.85rem;color:rgba(255,255,255,0.8);font-weight:600}
   .reviews-page .review-subtitle{font-size:.75rem;color:rgba(255,255,255,0.6);margin-top:4px;display:inline-block;background:rgba(255,255,255,0.1);padding:3px 12px;border-radius:var(--radius-pill)}
   @media(max-width:480px){
     .reviews-page .overall-stats{flex-direction:column;gap:14px;padding:24px 28px;min-width:0}
   }

  <section class="section section--accent" style="text-align:center"><div class="container"><h2>Ready to Feel Better?</h2><p style="font-size:1.1rem;margin-bottom:20px">Schedule your initial evaluation and let's make things happen!</p><a href="/new-appointment/" class="btn btn--accent btn--lg"><svg class="svg-icon" style="width:1em;height:1em;vertical-align:middle;fill:currentColor;overflow:hidden" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg"><path d="M440.6 834.15H169.84c-20.48 0-37.14-16.67-37.14-37.15V419.47h717.09v21.29c0 18.12 14.68 32.8 32.8 32.8s32.8-14.68 32.8-32.8V254.11c0-56.65-46.09-102.74-102.75-102.74h-77.23v-41.16c0-18.12-14.69-32.8-32.8-32.8s-32.8 14.69-32.8 32.8v41.16H317.88v-41.16c0-18.12-14.69-32.8-32.8-32.8-18.12 0-32.8 14.69-32.8 32.8v41.16h-82.45c-56.65 0-102.74 46.08-102.74 102.74V797c0 56.65 46.08 102.75 102.74 102.75H440.6c18.12 0 32.8-14.68 32.8-32.8 0-18.12-14.68-32.8-32.8-32.8zM169.84 216.97h82.45v35.49c0 18.12 14.69 32.8 32.8 32.8 18.12 0 32.8-14.69 32.8-32.8v-35.49h351.93v35.49c0 18.12 14.69 32.8 32.8 32.8s32.8-14.69 32.8-32.8v-35.49h77.23c20.48 0 37.15 16.66 37.15 37.14v99.76H132.7v-99.76c0-20.48 16.66-37.14 37.14-37.14z"/><path d="M351.34 526.46H218.83c-18.12 0-32.8 14.69-32.8 32.8s14.69 32.8 32.8 32.8h132.51c18.12 0 32.8-14.69 32.8-32.8s-14.68-32.8-32.8-32.8zM813.75 682.43h-69.31v-77.97c0-15.1-12.24-27.33-27.33-27.33-15.1 0-27.33 12.24-27.33 27.33v105.3c0 15.1 12.24 27.33 27.33 27.33h96.64c15.09 0 27.33-12.24 27.33-27.33s-12.23-27.33-27.33-27.33zM351.34 701.38H218.83c-18.12 0-32.8 14.69-32.8 32.8 0 18.12 14.69 32.8 32.8 32.8h132.51c18.12 0 32.8-14.69 32.8-32.8 0-18.12-14.68-32.8-32.8-32.8z"/><path d="M716.05 464.75C583.14 464.75 475 572.89 475 705.8s108.14 241.05 241.05 241.05S957.1 838.71 957.1 705.8 848.96 464.75 716.05 464.75z m0 416.49c-96.75 0-175.45-78.7-175.45-175.45s78.7-175.45 175.45-175.45S891.5 609.05 891.5 705.8s-78.7 175.44-175.45 175.44z"/></svg> Request Appointment</a></div></section>

<script src="/js/main.js"></script>
<script src="/js/br-reviews.js"></script>

<script>
(function(){
  var grid = document.getElementById('reviews-page-grid');
  var statsEl = document.getElementById('overall-stats');
  var avatarColors = ['var(--success)','var(--primary)','var(--accent)','var(--primary-dark)','var(--secondary)','#e74c3c','#8e44ad','#16a085'];

  function getInitials(name){
    return (name||'?').split(' ').map(function(w){return w.charAt(0).toUpperCase()}).join('').substring(0,2);
  }

  function starStr(r){return '★'.repeat(Math.round(r)) + '☆'.repeat(5 - Math.round(r));}

  function escapeHTML(str){
    var d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  window._pageReviews = [];
  window._pageToggleReview = function(event, idx){
    if (event) { event.stopPropagation(); event.preventDefault(); }
    var review = window._pageReviews[idx];
    if (!review) return;
    var textEl = grid.querySelector('.review-card__text[data-idx="' + idx + '"]');
    if (!textEl) return;
    var readmoreEl = grid.querySelector('.review-card__readmore[data-idx="' + idx + '"]');
    var isExpanded = textEl.classList.contains('expanded');
    if (isExpanded){
      textEl.classList.remove('expanded');
      textEl.style.maxHeight = '';
      textEl.style.overflow = '';
      textEl.textContent = review.text.length > 150 ? review.text.substring(0, 150) + '...' : review.text;
      if (readmoreEl) readmoreEl.innerHTML = 'Read more ▼';
    } else {
      textEl.classList.add('expanded');
      textEl.style.maxHeight = 'none';
      textEl.style.overflow = 'visible';
      textEl.textContent = review.text;
      if (readmoreEl) readmoreEl.innerHTML = 'Show less ▲';
    }
  };

  function renderReviews(reviews, overallRating, totalReviews){
    window._pageReviews = reviews;

    // Overall stats — Glass + Google branded card
    statsEl.innerHTML = '<div class="stats-google-badge">' +
        '<div class="stats-google-g">G</div>' +
        '<span class="stats-google-label">Google</span>' +
      '</div>' +
      '<div class="stats-rating-block">' +
        '<div class="overall-rating">' + overallRating.toFixed(1) + '</div>' +
        '<div class="overall-stars">' + starStr(overallRating) + '</div>' +
        '<div class="overall-count">Based on ' + totalReviews + ' Google reviews</div>' +
        '<span class="review-subtitle">Showing ' + reviews.length + ' most recent</span>' +
      '</div>';

    // Review cards
    grid.innerHTML = reviews.map(function(r, i){
      var isLong = r.text.length > 150;
      var displayText = isLong ? escapeHTML(r.text.substring(0, 150)) + '...' : escapeHTML(r.text);
      var readMoreHTML = isLong
        ? '<span class="review-card__readmore" data-idx="' + i + '" onclick="event.stopPropagation();window._pageToggleReview(event,' + i + ')">Read more ▼</span>'
        : '';
      var photoHTML = r.photo
        ? '<div class="review-card__avatar" style="background:' + avatarColors[i % avatarColors.length] + '"><img src="' + escapeHTML(r.photo) + '" referrerpolicy="no-referrer" alt="" style="width:100%;height:100%;border-radius:50%;object-fit:cover"></div>'
        : '<div class="review-card__avatar" style="background:' + avatarColors[i % avatarColors.length] + '">' + getInitials(r.name) + '</div>';
      return '<div class="review-card">' +
        '<div class="review-card__header">' +
        photoHTML +
        '<div><div class="review-card__stars">' + starStr(r.rating) + '</div><strong>' + escapeHTML(r.name) + '</strong></div>' +
        '</div>' +
        '<p class="review-card__text" data-idx="' + i + '" onclick="window._pageToggleReview(event,' + i + ')">' + displayText + '</p>' +
        readMoreHTML +
        '</div>';
    }).join('');
  }

  // The server-side cache (api/reviews-cache.json, refreshed nightly) always
  // provides 20 reviews (archive real + curated filler). No client-side padding
  // or fallback duplication needed — api/fallback-reviews.js is the single
  // source of truth when fallback is necessary.
  fetch('/api/reviews?newest=20')
    .then(function(r){ return r.json(); })
    .then(function(data){
      var reviews = (data.reviews && data.reviews.length) ? data.reviews : [];
      if (reviews.length) {
        renderReviews(reviews, data.overall_rating || 5.0, data.total_reviews || reviews.length);
        window.__sharedReviews = reviews;
      } else {
        grid.innerHTML = '<p style="text-align:center;color:#fff;padding:40px">No reviews available right now. Please check back soon!</p>';
        statsEl.innerHTML = '';
      }
    })
    .catch(function(){
      grid.innerHTML = '<p style="text-align:center;color:#fff;padding:40px">Unable to load reviews. Please refresh the page or try again later.</p>';
      statsEl.innerHTML = '';
    });
})();
</script>
</body>
