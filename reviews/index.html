<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Patient Reviews - Bratton Physical Therapy Slidell LA</title>
<meta name="description" content="Read what our patients say about Bratton Physical Therapy in Slidell, LA.">
<meta property="og:title" content="Patient Reviews - Bratton Physical Therapy">
<meta property="og:description" content="Read what our patients say about Bratton Physical Therapy in Slidell, LA.">
<meta property="og:url" content="/reviews/">
<meta property="og:site_name" content="Bratton Physical Therapy">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css"><link rel="stylesheet" href="/css/header.css"><link rel="stylesheet" href="/css/home.css">
<link rel="shortcut icon" type="image/x-icon" href="/favicon.ico" />
<style>
  .reviews-page-grid{display:grid;gap:20px;grid-template-columns:1fr}
  @media(min-width:768px){.reviews-page-grid{grid-template-columns:repeat(2,1fr)}}
  .reviews-page-grid .review-card{display:block;animation:none}
  .reviews-page-grid .review-card__text{max-height:4.4em;overflow:hidden;position:relative;transition:max-height .3s ease}
  .reviews-page-grid .review-card__text.expanded{max-height:none!important;overflow:visible!important}
  .reviews-page-grid .review-card__readmore{cursor:pointer;color:var(--primary);font-size:.82rem;font-weight:600;margin-top:6px;display:block}
  .reviews-page-grid .review-card__readmore:hover{color:var(--accent)}
  .reviews-page .overall-stats{text-align:center;margin-bottom:24px}
  .reviews-page .overall-rating{font-size:3rem;font-family:var(--font-heading);font-weight:800;color:var(--accent);line-height:1}
  .reviews-page .overall-stars{font-size:1.4rem;color:var(--accent);margin:4px 0}
  .reviews-page .overall-count{font-size:.9rem;color:var(--gray)}
</style>
</head>
<body>
<div id="site-header"></div>
<script>
  fetch('/templates/header.html')
    .then(function(r){return r.text()})
    .then(function(h){document.getElementById('site-header').innerHTML=h})
    .then(function(){
      var toggle=document.getElementById('menu-toggle');
      var nav=document.getElementById('main-nav');
      if(toggle&&nav){toggle.addEventListener('click',function(){nav.classList.toggle('nav--open')})}
      var path=window.location.pathname;
      document.querySelectorAll('.nav__link').forEach(function(link){
        link.classList.toggle('nav__link--active',link.getAttribute('href')===path);
      });
    });
</script>

<main id="main-content">
  <section class="section reviews-page">
    <div class="container">
      <div class="section-title">
        <h1>Patient Reviews</h1>
        <p>Hear from real patients about their experience at Bratton Physical Therapy</p>
      </div>
      <div class="overall-stats" id="overall-stats">Loading...</div>
      <div class="reviews-page-grid" id="reviews-page-grid">Loading reviews...</div>
    </div>
  </section>

  <section class="section section--accent" style="text-align:center"><div class="container"><h2>Ready to Feel Better?</h2><p style="font-size:1.1rem;margin-bottom:20px">Schedule your initial evaluation and let's make things happen!</p><a href="tel:9856415825" class="btn btn--accent btn--lg">&#x260E; Call Today (985) 641-5825</a></div></section>

<div id="site-footer"></div>
<script>
  fetch('/templates/footer.html')
    .then(function(r){return r.text()})
    .then(function(f){document.getElementById('site-footer').innerHTML=f});
</script>
</main>

<script src="/js/main.js"></script>

<script>
(function(){
  var grid = document.getElementById('reviews-page-grid');
  var statsEl = document.getElementById('overall-stats');
  var avatarColors = ['var(--success)','var(--primary)','var(--accent)','var(--primary-dark)','var(--secondary)','#e74c3c','#8e44ad','#16a085'];

  function getInitials(name){
    return (name||'?').split(' ').map(function(w){return w.charAt(0).toUpperCase()}).join('').substring(0,2);
  }

  function starStr(r){return '★'.repeat(Math.round(r)) + '☆'.repeat(5 - Math.round(r));}

  function escapeHTML(str){
    var d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  window._pageReviews = [];
  window._pageToggleReview = function(event, idx){
    if (event) { event.stopPropagation(); event.preventDefault(); }
    var review = window._pageReviews[idx];
    if (!review) return;
    var textEl = grid.querySelector('.review-card__text[data-idx="' + idx + '"]');
    if (!textEl) return;
    var readmoreEl = grid.querySelector('.review-card__readmore[data-idx="' + idx + '"]');
    if (textEl.classList.contains('expanded')){
      textEl.classList.remove('expanded');
      textEl.style.maxHeight = '4.4em';
      textEl.style.overflow = 'hidden';
      if (readmoreEl) readmoreEl.innerHTML = 'Read more ▼';
    } else {
      textEl.classList.add('expanded');
      textEl.style.maxHeight = 'none';
      textEl.style.overflow = 'visible';
      if (readmoreEl) readmoreEl.innerHTML = 'Show less ▲';
    }
  };

  function renderReviews(reviews, overallRating, totalReviews){
    window._pageReviews = reviews;

    // Overall stats
    statsEl.innerHTML = '<div class="overall-rating">' + overallRating.toFixed(1) + '</div>' +
      '<div class="overall-stars">' + starStr(overallRating) + '</div>' +
      '<div class="overall-count">Based on ' + totalReviews + ' Google reviews</div>';

    // Review cards
    grid.innerHTML = reviews.map(function(r, i){
      var isLong = r.text.length > 150;
      var displayText = escapeHTML(r.text);
      var readMoreHTML = isLong
        ? '<span class="review-card__readmore" data-idx="' + i + '" onclick="event.stopPropagation();window._pageToggleReview(event,' + i + ')">Read more ▼</span>'
        : '';
      var photoHTML = r.photo
        ? '<div class="review-card__avatar" style="background:' + avatarColors[i % avatarColors.length] + ';background-image:url(' + escapeHTML(r.photo) + ');background-size:cover;background-position:center"></div>'
        : '<div class="review-card__avatar" style="background:' + avatarColors[i % avatarColors.length] + '">' + getInitials(r.name) + '</div>';
      return '<div class="review-card">' +
        '<div class="review-card__header">' +
        photoHTML +
        '<div><div class="review-card__stars">' + starStr(r.rating) + '</div><strong>' + escapeHTML(r.name) + '</strong></div>' +
        '</div>' +
        '<p class="review-card__text" data-idx="' + i + '" onclick="window._pageToggleReview(event,' + i + ')">' + displayText + '</p>' +
        readMoreHTML +
        '</div>';
    }).join('');
  }

  fetch('/api/reviews?newest=20')
    .then(function(r){ return r.json(); })
    .then(function(data){
      var allReviews = (data.reviews && data.reviews.length) ? data.reviews : [];
      var reviews = allReviews;
      if (reviews.length) {
        renderReviews(reviews, data.overall_rating || 5.0, data.total_reviews || reviews.length);
      } else {
        grid.innerHTML = '<p style="text-align:center;grid-column:1/-1;color:var(--gray)">No reviews available at this time. Check back soon!</p>';
        statsEl.innerHTML = '<div class="overall-rating">5.0</div><div class="overall-stars">★★★★★</div><div class="overall-count">Check our Google reviews</div>';
      }
    })
    .catch(function(){
      grid.innerHTML = '<p style="text-align:center;grid-column:1/-1;color:var(--gray)">Unable to load reviews. Please check back later.</p>';
      statsEl.innerHTML = '<div class="overall-rating">5.0</div><div class="overall-stars">★★★★★</div><div class="overall-count">Check our Google reviews</div>';
    });
})();
</script>
</body>
</html>
